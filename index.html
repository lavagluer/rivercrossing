<div id="cross-root"></div>
<style>
#cross-root {
  --sky-1: #1a2333;
  --sky-2: #2c3a52;
  --river: #16283a;
  --steel: #7c9db3;
  --steel-dim: #3d5468;
  --wood: #b8834a;
  --wood-dim: #5c4429;
  --gold: #d9b449;
  --alert: #c1503f;
  --text-main: #eef0ea;
  --text-dim: #9aabb8;
  --line: #34455a;
  --card: #202b3d;

  font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: linear-gradient(180deg, var(--sky-1), var(--sky-2) 60%, var(--river));
  color: var(--text-main);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 0 0 1px var(--line);
}
#cross-root * { box-sizing: border-box; }
.wrap { max-width: 860px; margin: 0 auto; padding: 20px 18px 36px; position: relative; }

.eyebrow {
  font-size: 11px; letter-spacing: 3px; color: var(--gold); font-weight: 700; margin-bottom: 4px;
}
h1.title {
  font-family: 'Noto Serif KR', serif; font-size: 24px; margin: 0 0 4px; letter-spacing: .5px;
}
.subtitle { color: var(--text-dim); font-size: 13px; margin: 0 0 18px; }

/* Bridge scene */
.scene {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 16px 10px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.scene-title { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px; display:flex; justify-content: space-between;}
.river-view {
  position: relative;
  height: 110px;
  background: linear-gradient(180deg, #0e1c2a, #0a1520);
  border-radius: 8px;
  overflow: hidden;
}
.bank { position: absolute; bottom: 0; width: 46px; height: 26px; background: #2f4a35; }
.bank.left { left: 0; border-radius: 0 6px 0 0; }
.bank.right { right: 0; border-radius: 6px 0 0 0; }
.bank-icon { position: absolute; bottom: 26px; font-size: 20px; }
.bank-icon.left { left: 6px; }
.bank-icon.right { right: 6px; }
.plank-row { position: absolute; bottom: 26px; left: 46px; right: 46px; height: 12px; display: flex; gap: 3px; }
.plank {
  flex: 1; height: 12px; border-radius: 2px; background: #16222f; border: 1px solid #223142;
  transition: background .4s, box-shadow .4s;
}
.plank.lit { background: linear-gradient(90deg, var(--wood), var(--wood-dim)); box-shadow: 0 0 6px #d9b44955; border-color: var(--gold); }
.plank.spark::after { content:''; }
.water-line { position: absolute; bottom: 0; left: 0; right: 0; height: 26px; }
.water-line::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg, #16283a 0 20px, #1c3049 20px 40px);
  opacity: .6;
}
.progress-caption { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); margin-top: 8px; }

/* completion overlay */
.complete-banner {
  margin-top: 10px; padding: 12px 14px; border: 1px solid var(--gold); background: #2c220f;
  border-radius: 8px; font-size: 13px; color: var(--gold); display: none;
}

/* Day tracker */
.day-strip { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.day-chip {
  flex: 1; min-width: 70px; background: var(--card); border: 1px solid var(--line); border-radius: 8px;
  padding: 8px 6px; text-align: center; font-size: 11px; color: var(--text-dim);
}
.day-chip.today { border-color: var(--gold); color: var(--gold); }
.day-chip.done { background: #223326; border-color: #3f6b46; color: #9fd6a8; }
.day-chip .dnum { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; display:block; margin-bottom:2px; }
.day-chip .dhour { font-size: 10px; }

/* Resource cards */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
@media (max-width: 480px) { .grid2 { grid-template-columns: 1fr; } }
.res-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
.res-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.res-icon { font-size: 20px; }
.res-name { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 15px; }
.res-track { height: 10px; background: #16202c; border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
.res-fill { height: 100%; border-radius: 5px; transition: width .3s; }
.res-fill.steel { background: linear-gradient(90deg, var(--steel-dim), var(--steel)); }
.res-fill.wood { background: linear-gradient(90deg, var(--wood-dim), var(--wood)); }
.res-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
.res-today { font-size: 11px; color: var(--gold); margin-bottom: 10px; }
.qrow { display: flex; gap: 6px; flex-wrap: wrap; }
.qbtn {
  background: #16202c; border: 1px solid var(--line); color: var(--text-main);
  font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
}
.qbtn:hover { border-color: var(--gold); color: var(--gold); }

/* hours log */
.log-panel { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.log-panel h3 { font-family: 'Noto Serif KR', serif; margin: 0 0 10px; font-size: 14px; }
.log-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.log-row label { font-size: 12px; color: var(--text-dim); }
.log-row input { background: #16202c; border: 1px solid var(--line); color: var(--text-main); padding: 6px 10px; border-radius: 6px; width: 90px; font-family: 'JetBrains Mono', monospace; }
.save-btn { background: var(--gold); color: #241d05; border: none; font-weight: 700; padding: 8px 16px; border-radius: 7px; cursor: pointer; font-size: 13px; }
.save-btn:hover { background: #eac765; }
.reset-link { font-size: 11px; color: var(--text-dim); background: none; border: none; cursor: pointer; text-decoration: underline; margin-left: auto; }

/* toast */
.toast {
  position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px);
  background: #1b2534; border: 1px solid var(--gold); color: var(--gold);
  padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all .35s; pointer-events: none;
  z-index: 20; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<script>
(function(){
  const root = document.getElementById('cross-root');

  const PLAN = [
    { day:1, econ:2, hun:12, hours:4 },
    { day:2, econ:3, hun:12, hours:5 },
    { day:3, econ:4, hun:15, hours:6.5 },
    { day:4, econ:5, hun:18, hours:8 },
    { day:5, econ:5, hun:21, hours:8.5 },
    { day:6, econ:6, hun:15, hours:8.5 },
    { day:7, econ:6, hun:18, hours:9 },
    { day:8, econ:7, hun:12, hours:9 },
    { day:9, econ:8, hun:2,  hours:8.33 },
  ];
  const ECON_TARGET = 46, HUN_TARGET = 125;
  const TOTAL_UNITS = ECON_TARGET + HUN_TARGET;
  const PLANK_COUNT = 18;
  const MS_DAY = 86400000;

  function toMidnight(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
  function fmtDate(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }

  let state = { startDate: null, dailyLogs: {} };

  async function load(){
    try {
      const res = await window.storage.get('river-crossing-state', false);
      if (res && res.value) state = JSON.parse(res.value);
    } catch(e) {}
    if (!state.startDate) state.startDate = fmtDate(toMidnight(new Date()));
    render();
    save(false);
  }

  async function save(doRender){
    try { await window.storage.set('river-crossing-state', JSON.stringify(state), false); }
    catch(e) { console.error('저장 실패', e); }
    if (doRender !== false) render();
  }

  function dayNumber(){
    const start = toMidnight(new Date(state.startDate));
    const today = toMidnight(new Date());
    return Math.min(9, Math.max(1, Math.floor((today-start)/MS_DAY)+1));
  }
  function todayKey(){ return fmtDate(toMidnight(new Date())); }

  function getToday(){
    const k = todayKey();
    if (!state.dailyLogs[k]) state.dailyLogs[k] = { econ:0, hun:0, hours:0 };
    return state.dailyLogs[k];
  }

  function totals(){
    let econ=0, hun=0, hours=0;
    Object.values(state.dailyLogs).forEach(d => { econ+=d.econ||0; hun+=d.hun||0; hours+=d.hours||0; });
    return { econ, hun, hours };
  }

  function cumulativeTarget(day){
    let econ=0, hun=0, hours=0;
    for (let i=0;i<day;i++){ econ+=PLAN[i].econ; hun+=PLAN[i].hun; hours+=PLAN[i].hours; }
    return { econ, hun, hours };
  }

  let toastTimer;
  function toast(msg){
    let el = root.querySelector('.toast');
    if (!el) { el = document.createElement('div'); el.className='toast'; root.querySelector('.wrap').appendChild(el); }
    el.textContent = msg;
    requestAnimationFrame(()=> el.classList.add('show'));
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> el.classList.remove('show'), 2600);
  }

  function render(){
    const t = totals();
    const dn = dayNumber();
    const today = getToday();
    const cumTarget = cumulativeTarget(dn);
    const overallUnits = t.econ + t.hun;
    const overallPct = Math.min(100, Math.round((overallUnits/TOTAL_UNITS)*100));
    const litPlanks = Math.floor((overallUnits/TOTAL_UNITS)*PLANK_COUNT);
    const complete = t.econ >= ECON_TARGET && t.hun >= HUN_TARGET;

    const old = root.querySelector('.wrap'); if (old) old.remove();
    const wrap = document.createElement('div'); wrap.className='wrap';

    wrap.innerHTML = `
      <div class="eyebrow">D-9 도하작전</div>
      <h1 class="title">부교 건설 작전</h1>
      <p class="subtitle">경제학 46강(강철 부품) · 헌법 125문항(목재 부품) — 다리를 완성하면 도하한다</p>

      <div class="scene">
        <div class="scene-title"><span>부교 진척도</span><span>${overallPct}%</span></div>
        <div class="river-view">
          <div class="water-line"></div>
          <div class="bank left"></div>
          <div class="bank right"></div>
          <div class="bank-icon left">🏕️</div>
          <div class="bank-icon right">🏰</div>
          <div class="plank-row" id="plank-row"></div>
        </div>
        <div class="progress-caption">${overallUnits} / ${TOTAL_UNITS} 부품 사용됨</div>
        <div class="complete-banner" id="complete-banner">
          도하 완료 — 다리를 건넜다. 이제 돌아갈 길은 없다. 본대가 강 건너편에서 전면전을 기다리고 있다.
        </div>
      </div>

      <div class="day-strip" id="day-strip"></div>

      <div class="grid2">
        <div class="res-card">
          <div class="res-head"><span class="res-icon">🔩</span><span class="res-name">강철 부품 (경제학)</span></div>
          <div class="res-track"><div class="res-fill steel" style="width:${Math.min(100,Math.round(t.econ/ECON_TARGET*100))}%"></div></div>
          <div class="res-count">${t.econ} / ${ECON_TARGET}강</div>
          <div class="res-today">오늘 목표: ${PLAN[dn-1].econ}강 (누적목표 ${cumTarget.econ}강)</div>
          <div class="qrow">
            <button class="qbtn" data-r="econ" data-n="1">+1강</button>
            <button class="qbtn" data-r="econ" data-n="2">+2강</button>
            <button class="qbtn" data-r="econ" data-n="5">+5강</button>
          </div>
        </div>
        <div class="res-card">
          <div class="res-head"><span class="res-icon">🪵</span><span class="res-name">목재 부품 (헌법)</span></div>
          <div class="res-track"><div class="res-fill wood" style="width:${Math.min(100,Math.round(t.hun/HUN_TARGET*100))}%"></div></div>
          <div class="res-count">${t.hun} / ${HUN_TARGET}문항</div>
          <div class="res-today">오늘 목표: ${PLAN[dn-1].hun}문항 (누적목표 ${cumTarget.hun}문항)</div>
          <div class="qrow">
            <button class="qbtn" data-r="hun" data-n="1">+1문항</button>
            <button class="qbtn" data-r="hun" data-n="5">+5문항</button>
            <button class="qbtn" data-r="hun" data-n="10">+10문항</button>
          </div>
        </div>
      </div>

      <div class="log-panel">
        <h3>오늘의 작업 시간 (${todayKey()}) · 목표 ${PLAN[dn-1].hours}h</h3>
        <div class="log-row">
          <label>실제 투입 시간(h)</label>
          <input type="number" id="hours-input" min="0" step="0.5" value="${today.hours || ''}" placeholder="0">
          <button class="save-btn" id="save-btn">저장</button>
          <button class="reset-link" id="reset-btn">초기화</button>
        </div>
      </div>
    `;
    root.appendChild(wrap);

    // planks
    const row = wrap.querySelector('#plank-row');
    for (let i=0;i<PLANK_COUNT;i++){
      const p = document.createElement('div');
      p.className = 'plank' + (i < litPlanks ? ' lit' : '');
      row.appendChild(p);
    }

    // day strip
    const strip = wrap.querySelector('#day-strip');
    PLAN.forEach(p => {
      const cum = cumulativeTarget(p.day);
      const isDone = overallUnits >= (cum.econ + cum.hun) && p.day <= dn;
      const isToday = p.day === dn;
      const chip = document.createElement('div');
      chip.className = 'day-chip' + (isToday ? ' today' : '') + (isDone && !isToday ? ' done' : (isDone && isToday ? ' done' : ''));
      chip.innerHTML = `<span class="dnum">D${p.day}${isDone ? ' ✓' : ''}</span><span class="dhour">${p.hours}h · 경${p.econ}/헌${p.hun}</span>`;
      strip.appendChild(chip);
    });

    if (complete) {
      wrap.querySelector('#complete-banner').style.display = 'block';
    }

    wrap.querySelectorAll('.qbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const r = btn.dataset.r, n = parseInt(btn.dataset.n,10);
        const day = getToday();
        day[r] = (day[r]||0) + n;
        const newTotals = totals();
        save();
        if (r==='econ' && Math.floor(newTotals.econ/5) > Math.floor((newTotals.econ-n)/5)) toast('보급 상자 도착: 강철 부품 +5');
        if (r==='hun' && Math.floor(newTotals.hun/25) > Math.floor((newTotals.hun-n)/25)) toast('탄약 상자 도착: 목재 부품 +25');
        if (newTotals.econ>=ECON_TARGET && newTotals.hun>=HUN_TARGET) toast('부교 완성 — 도하 준비 완료');
      });
    });

    wrap.querySelector('#save-btn').addEventListener('click', () => {
      const day = getToday();
      day.hours = parseFloat(wrap.querySelector('#hours-input').value) || 0;
      save();
      toast('오늘 작업시간 기록됨');
    });

    wrap.querySelector('#reset-btn').addEventListener('click', () => {
      if (confirm('도하작전 기록을 초기화합니다. 계속할까요?')) {
        state = { startDate: fmtDate(toMidnight(new Date())), dailyLogs: {} };
        save();
      }
    });
  }

  load();
})();
</script>
